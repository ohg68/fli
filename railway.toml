[build]
builder = "NIXPACKS"
nixpacksPlan = { "repo" = "punitarani/fli" }

[deploy]
numReplicas = 1
startCommand = "uv run python -c "import os; os.environ['HOST']='0.0.0.0'; os.environ['PORT']='8080'; from fli.mcp.http_server import main; main()"
sleepApplication = true
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
